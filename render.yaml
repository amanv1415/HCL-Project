services:
  - type: web
    name: urei-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_CONFIG
        value: production
      - key: FLASK_APP
        value: wsgi:app
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: urei-db
          property: connectionString

databases:
  - name: urei-db
    plan: free
